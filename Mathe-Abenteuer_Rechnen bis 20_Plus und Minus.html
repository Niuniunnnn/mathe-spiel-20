<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<title>Mathe-Abenteuer – Rechnen bis 20</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg:       #FFF8F0;
    --card:     #FFFFFF;
    --purple:   #7C3AED;
    --purple2:  #6D28D9;
    --teal:     #0D9488;
    --teal2:    #0F766E;
    --yellow:   #FCD34D;
    --yellow2:  #F59E0B;
    --red:      #EF4444;
    --green:    #22C55E;
    --ink:      #1E1B4B;
    --muted:    #6B7280;
    --r:        20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    padding: env(safe-area-inset-top, 24px) env(safe-area-inset-right, 16px) env(safe-area-inset-bottom, 48px) env(safe-area-inset-left, 16px);
    background-image:
      radial-gradient(circle at 10% 15%, #EDE9FE 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #CCFBF1 0%, transparent 40%);
  }

  /* ── Header ── */
  .game-header {
    text-align: center;
    margin-bottom: 20px;
  }
  .game-header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 2.8rem);
    color: var(--purple);
    letter-spacing: 0.5px;
    line-height: 1.1;
  }
  .game-header p {
    font-size: 0.95rem;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 600;
  }

  /* ── Progress row ── */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 460px;
    margin-bottom: 18px;
  }
  .score-pill {
    background: var(--purple);
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    border-radius: 50px;
    padding: 6px 18px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .progress-track {
    flex: 1;
    height: 12px;
    background: #E5E7EB;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--teal));
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .round-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border-radius: var(--r);
    box-shadow: 0 6px 32px rgba(124,58,237,0.10), 0 1px 4px rgba(0,0,0,0.06);
    width: 100%;
    max-width: 460px;
    padding: 32px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* ── Emoji mascot ── */
  .mascot {
    font-size: 2.8rem;
    line-height: 1;
    transition: transform 0.3s;
  }
  .mascot.bounce { animation: bounce 0.5s ease; }
  @keyframes bounce {
    0%,100%{transform:translateY(0)} 40%{transform:translateY(-14px)} 70%{transform:translateY(-6px)}
  }
  .mascot.shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
  }

  /* ── Question ── */
  .question-box {
    text-align: center;
  }
  .question-label {
    font-size: 0.78rem;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 10px;
  }
  .question-text {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.8rem, 10vw, 4.2rem);
    color: var(--ink);
    line-height: 1;
    letter-spacing: 1px;
  }
  .question-text .op {
    color: var(--purple);
    margin: 0 8px;
  }
  .question-text .eq {
    color: var(--teal);
    margin: 0 8px;
  }
  .question-text .blank {
    display: inline-block;
    min-width: 64px;
    border-bottom: 4px solid var(--yellow2);
    color: var(--yellow2);
    vertical-align: baseline;
  }

  /* ── Number pad ── */
  .numpad {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    width: 100%;
  }
  .num-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    background: #F3F4F6;
    color: var(--ink);
    border: 2.5px solid transparent;
    border-radius: 12px;
    padding: 12px 0;
    min-height: 44px;
    cursor: pointer;
    transition: background 0.12s, transform 0.1s, border-color 0.12s;
    user-select: none;
    -webkit-user-select: none;
  }
  .num-btn:hover { background: #EDE9FE; border-color: var(--purple); }
  .num-btn:active { transform: scale(0.93); }
  .num-btn.selected {
    background: var(--purple);
    color: #fff;
    border-color: var(--purple2);
  }

  /* ── Action buttons ── */
  .action-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  .btn {
    flex: 1;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    border: none;
    border-radius: 14px;
    padding: 14px 0;
    cursor: pointer;
    transition: transform 0.1s, filter 0.1s;
    letter-spacing: 0.5px;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-clear {
    background: #F3F4F6;
    color: var(--muted);
    flex: 0 0 80px;
  }
  .btn-clear:hover:not(:disabled) { background: #E5E7EB; }
  .btn-confirm {
    background: linear-gradient(135deg, var(--purple) 0%, var(--teal) 100%);
    color: #fff;
    box-shadow: 0 4px 0 var(--purple2);
  }
  .btn-confirm:hover:not(:disabled) { filter: brightness(1.06); }
  .btn-confirm:active:not(:disabled) { box-shadow: none; transform: translateY(3px); }

  /* ── Feedback ── */
  .feedback-box {
    min-height: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    text-align: center;
  }
  .feedback-main {
    font-family: 'Fredoka One', cursive;
    font-size: 1.25rem;
    color: var(--ink);
  }
  .feedback-main.correct { color: var(--green); }
  .feedback-main.wrong   { color: var(--red); }
  .feedback-sub {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
  }

  /* ── Hearts / lives ── */
  .hearts {
    font-size: 1.4rem;
    letter-spacing: 3px;
    line-height: 1;
  }

  /* ── Results screen ── */
  #results-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    text-align: center;
    padding: 8px 0;
  }
  .result-trophy { font-size: 5rem; line-height: 1; }
  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--purple);
  }
  .result-score-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .result-big {
    font-family: 'Fredoka One', cursive;
    font-size: 3.5rem;
    color: var(--ink);
    line-height: 1;
  }
  .result-big span { color: var(--purple); }
  .result-label { font-size: 0.9rem; font-weight: 700; color: var(--muted); }
  .result-stars { font-size: 2rem; letter-spacing: 4px; }
  .result-msg {
    font-size: 1rem;
    font-weight: 700;
    color: var(--teal);
    background: #F0FDF9;
    border-radius: 12px;
    padding: 10px 18px;
  }
  .stats-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: #F3F4F6;
    border-radius: 12px;
    padding: 8px 16px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat-chip span { font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--purple); }
  .btn-restart {
    background: linear-gradient(135deg, var(--purple) 0%, var(--teal) 100%);
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    border: none;
    border-radius: 14px;
    padding: 14px 0;
    cursor: pointer;
    width: 100%;
    box-shadow: 0 4px 0 var(--purple2);
    letter-spacing: 0.5px;
    transition: filter 0.1s, transform 0.1s;
  }
  .btn-restart:hover { filter: brightness(1.06); }
  .btn-restart:active { box-shadow: none; transform: translateY(3px); }
</style>
</head>
<body>

<div class="game-header">
  <h1>🔢 Mathe-Abenteuer</h1>
  <p>Rechnen bis 20 – Plus und Minus</p>
</div>

<div class="progress-row">
  <div class="score-pill">⭐ <span id="score-val">0</span></div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="round-label" id="round-label">1 / 10</div>
</div>

<div class="card" id="game-card">

  <!-- Game view -->
  <div id="game-view" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:22px;">

    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
      <div class="mascot" id="mascot">🦔</div>
      <div class="hearts" id="hearts">❤️❤️❤️</div>
    </div>

    <div class="question-box">
      <div class="question-label">Was ist das Ergebnis?</div>
      <div class="question-text" id="question-text">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- Number pad 0-20 in 4 rows -->
    <div class="numpad" id="numpad">
      <!-- filled by JS -->
    </div>

    <div class="feedback-box">
      <div class="feedback-main" id="fb-main"></div>
      <div class="feedback-sub"  id="fb-sub"></div>
    </div>

    <div class="action-row">
      <button class="btn btn-clear" id="btn-clear">✕</button>
      <button class="btn btn-confirm" id="btn-confirm" disabled>Prüfen ✓</button>
    </div>

  </div>

  <!-- Results view -->
  <div id="results-screen">
    <div class="result-trophy" id="result-trophy">🏆</div>
    <div class="result-title">Geschafft!</div>
    <div class="result-score-row">
      <div class="result-big"><span id="res-score">0</span> / 100</div>
      <div class="result-label">Punkte</div>
    </div>
    <div class="result-stars" id="res-stars">⭐⭐⭐</div>
    <div class="result-msg" id="res-msg"></div>
    <div class="stats-row">
      <div class="stat-chip">Richtig<span id="res-correct">0</span></div>
      <div class="stat-chip">Falsch<span id="res-wrong">0</span></div>
      <div class="stat-chip">Serie<span id="res-streak">0</span>🔥</div>
    </div>
    <button class="btn-restart" id="btn-restart">🔄 Nochmal spielen</button>
  </div>

</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const TOTAL      = 10;
const LIVES      = 3;
const MASCOTS    = ['🦔','🐨','🦊','🐸','🐧','🦉','🐙','🦋'];

// Positive messages
const OK_MSGS = [
  ['Super gemacht! 🎉', '+10 Punkte!'],
  ['Richtig! 🌟', 'Weiter so!'],
  ['Wunderbar! ✨', '+10 Punkte!'],
  ['Genau richtig! 🎊', 'Du bist toll!'],
  ['Klasse! 🥳', 'Weiter so!'],
];
const BAD_MSGS = [
  ['Nicht ganz…', 'Das richtige Ergebnis ist'],
  ['Fast! 😅', 'Die Antwort war'],
  ['Schade 😬', 'Richtig wäre'],
];

// ── State ────────────────────────────────────────────────────────────────────
let questions=[], qIdx=0, score=0, lives=LIVES;
let selected=null, answered=false;
let correctCount=0, wrongCount=0, streak=0, bestStreak=0;
let mascotEmoji = '🦔';

// ── Generate questions ───────────────────────────────────────────────────────
function makeQuestions() {
  const qs = [];
  // Mix of addition and subtraction, result always 0-20
  for (let i = 0; i < TOTAL; i++) {
    let a, b, op, ans;
    if (Math.random() < 0.55) {
      // Addition: a + b <= 20
      a = Math.floor(Math.random() * 18) + 1;  // 1-18
      b = Math.floor(Math.random() * (20 - a)) + 1;
      op = '+'; ans = a + b;
    } else {
      // Subtraction: a - b >= 0, a <= 20
      a = Math.floor(Math.random() * 19) + 1;  // 1-19
      b = Math.floor(Math.random() * a);        // 0 to a
      op = '−'; ans = a - b;
    }
    qs.push({ a, b, op, ans });
  }
  return qs;
}

// ── DOM helpers ──────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function buildNumpad() {
  const pad = $('numpad');
  pad.innerHTML = '';
  for (let n = 0; n <= 20; n++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = n;
    btn.dataset.val = n;
    btn.addEventListener('click', () => selectNum(n, btn));
    pad.appendChild(btn);
  }
}

function selectNum(n, btn) {
  if (answered) return;
  // deselect old
  document.querySelectorAll('.num-btn.selected').forEach(b => b.classList.remove('selected'));
  selected = n;
  btn.classList.add('selected');
  $('btn-confirm').disabled = false;
}

function setFeedback(main, sub, cls) {
  const el = $('fb-main');
  el.textContent = main;
  el.className = 'feedback-main' + (cls ? ' ' + cls : '');
  $('fb-sub').textContent = sub || '';
}

function setHearts() {
  const full  = '❤️'.repeat(lives);
  const empty = '🖤'.repeat(LIVES - lives);
  $('hearts').textContent = full + empty;
}

function setProgress(forceComplete) {
  const pct = forceComplete ? 100 : Math.round((qIdx / TOTAL) * 100);
  $('progress-fill').style.width = pct + '%';
  $('round-label').textContent = `${Math.min(qIdx+1, TOTAL)} / ${TOTAL}`;
  $('score-val').textContent = score;
}

// ── Audio (Web Audio API – iOS compatible) ────────────────────────────────────
let audioCtx = null;
let audioUnlocked = false;

function getAC() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

// iOS requires AudioContext to be created/resumed inside a user gesture.
// We unlock it on the very first touch anywhere on the page.
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  try {
    const ac = getAC();
    const buf = ac.createBuffer(1, 1, 22050);
    const src = ac.createBufferSource();
    src.buffer = buf;
    src.connect(ac.destination);
    src.start(0);
    ac.resume();
  } catch(e) {}
}
document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });
document.addEventListener('mousedown',  unlockAudio, { once: true });

function playCorrect() {
  try {
    const ac = getAC();
    // Happy ascending arpeggio C5-E5-G5-C6
    [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ac.currentTime + i * 0.1;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.22, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
      osc.start(t); osc.stop(t + 0.3);
    });
  } catch(e) {}
}

function playWrong() {
  try {
    const ac = getAC();
    // Descending dissonant buzz
    [[220, 0], [196, 0.15]].forEach(([freq, delay]) => {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'sawtooth';
      const t = ac.currentTime + delay;
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.linearRampToValueAtTime(freq * 0.7, t + 0.35);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
      osc.start(t); osc.stop(t + 0.4);
    });
  } catch(e) {}
}

function playFinish() {
  try {
    const ac = getAC();
    // Victory fanfare
    [{f:523.25,t:0,d:0.18},{f:659.25,t:0.18,d:0.18},{f:783.99,t:0.36,d:0.18},{f:1046.50,t:0.62,d:0.6}]
    .forEach(({f,t,d}) => {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'triangle';
      const start = ac.currentTime + t;
      osc.frequency.value = f;
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(0.28, start + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, start + d);
      osc.start(start); osc.stop(start + d + 0.05);
    });
  } catch(e) {}
}

function animateMascot(type) {
  const m = $('mascot');
  m.classList.remove('bounce','shake');
  void m.offsetWidth; // reflow
  m.classList.add(type);
}

// ── Round logic ──────────────────────────────────────────────────────────────
function loadRound() {
  answered = false; selected = null;
  document.querySelectorAll('.num-btn.selected').forEach(b => b.classList.remove('selected'));
  $('btn-confirm').disabled = true;
  $('btn-confirm').textContent = 'Prüfen ✓';
  setFeedback('', '');

  const q = questions[qIdx];
  $('question-text').innerHTML =
    `${q.a}<span class="op">${q.op}</span>${q.b}<span class="eq">=</span><span class="blank">?</span>`;
  setProgress();
}

function confirm() {
  if (answered) {
    // Advance
    qIdx++;
    if (qIdx >= TOTAL || lives <= 0) { showResults(); return; }
    loadRound();
    return;
  }
  if (selected === null) return;

  answered = true;
  const q = questions[qIdx];
  const correct = selected === q.ans;

  if (correct) {
    score += 10;
    correctCount++;
    streak++;
    bestStreak = Math.max(bestStreak, streak);
    const msg = OK_MSGS[Math.floor(Math.random() * OK_MSGS.length)];
    setFeedback(msg[0], msg[1], 'correct');
    animateMascot('bounce');
    playCorrect();
    $('question-text').innerHTML =
      `${q.a}<span class="op">${q.op}</span>${q.b}<span class="eq">=</span><span style="color:var(--green);font-family:'Fredoka One',cursive">${q.ans}</span>`;
  } else {
    lives--;
    wrongCount++;
    streak = 0;
    setHearts();
    const msg = BAD_MSGS[Math.floor(Math.random() * BAD_MSGS.length)];
    setFeedback(msg[0], `${msg[1]} ${q.ans}`, 'wrong');
    animateMascot('shake');
    playWrong();
    $('question-text').innerHTML =
      `${q.a}<span class="op">${q.op}</span>${q.b}<span class="eq">=</span><span style="color:var(--red);font-family:'Fredoka One',cursive;text-decoration:line-through">${selected}</span>`;
  }

  $('score-val').textContent = score;
  const isLast = (qIdx + 1 >= TOTAL || lives <= 0);
  $('btn-confirm').textContent = isLast ? 'Ergebnis 🏁' : 'Weiter ➡️';
}

// ── Results ──────────────────────────────────────────────────────────────────
function showResults() {
  // Fill progress bar to 100% before hiding game view
  $('progress-fill').style.width = '100%';
  $('round-label').textContent = `${TOTAL} / ${TOTAL}`;

  $('game-view').style.display = 'none';
  const rs = $('results-screen');
  rs.style.display = 'flex';

  $('res-score').textContent  = score;
  $('res-correct').textContent = correctCount;
  $('res-wrong').textContent   = wrongCount;
  $('res-streak').textContent  = bestStreak;

  const pct = score / 100;
  let stars, msg, trophy;
  if (pct === 1)       { stars='⭐⭐⭐'; msg='Perfekt! Du bist ein Mathe-Genie! 🧠'; trophy='🏆'; }
  else if (pct >= 0.8) { stars='⭐⭐⭐'; msg='Super! Fast alles richtig! 🎉'; trophy='🥇'; }
  else if (pct >= 0.6) { stars='⭐⭐'; msg='Gut gemacht! Weiter üben! 💪'; trophy='🥈'; }
  else if (pct >= 0.4) { stars='⭐'; msg='Nicht schlecht – du wirst besser! 📚'; trophy='🥉'; }
  else                 { stars=''; msg='Kopf hoch! Üben macht den Meister! 🌱'; trophy='🎯'; }

  $('result-trophy').textContent = trophy;
  $('res-stars').textContent     = stars;
  $('res-msg').textContent       = msg;

  playFinish();
}

// ── Game start ───────────────────────────────────────────────────────────────
function startGame() {
  questions    = makeQuestions();
  qIdx=0; score=0; lives=LIVES;
  correctCount=0; wrongCount=0; streak=0; bestStreak=0;
  mascotEmoji  = MASCOTS[Math.floor(Math.random() * MASCOTS.length)];
  $('mascot').textContent = mascotEmoji;
  $('results-screen').style.display = 'none';
  $('game-view').style.display      = 'flex';
  setHearts();
  buildNumpad();
  loadRound();
}

// ── Events ───────────────────────────────────────────────────────────────────
$('btn-confirm').addEventListener('click', confirm);
$('btn-clear').addEventListener('click', () => {
  if (answered) return;
  selected = null;
  document.querySelectorAll('.num-btn.selected').forEach(b => b.classList.remove('selected'));
  $('btn-confirm').disabled = true;
  setFeedback('','');
});
$('btn-restart').addEventListener('click', startGame);

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') { confirm(); return; }
  if (e.key === 'Escape') {
    if (!answered) {
      selected = null;
      document.querySelectorAll('.num-btn.selected').forEach(b=>b.classList.remove('selected'));
      $('btn-confirm').disabled=true;
    }
    return;
  }
  // number keys 0-9
  const n = parseInt(e.key);
  if (!isNaN(n) && !answered) {
    const btn = document.querySelector(`.num-btn[data-val="${n}"]`);
    if (btn) selectNum(n, btn);
  }
});

startGame();
</script>
</body>
</html>
